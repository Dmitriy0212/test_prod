<section id="reviews" class="reviews">
  <div class="container reviews-content">
    <h2 class="reviews-title">Відгуки клієнтів</h2>
    <h3 class="reviews-requests">
      Дізнайтеся, що кажуть наші задоволені клієнти про нашу меблі.
    </h3>
    <div class="slider-reviews-cont swiper">
      <ul
        class="slider__wrapper-reviews swiper-wrapper"
        id="slider__wrapper-reviews"
      ></ul>
      <div class="slider-nav-pag">
        <div class="swiper-pagination slider__pagination"></div>
        <div class="swiper-pagination-arrows">
          <button class="sliderArrows slider__btn slider__btn--prev">
            <svg viewBox="0 0 32 32" width="24" height="24">
              <use href="/icon.svg#icon-left-arrow-alt"></use>
            </svg>
          </button>
          <button class="sliderArrows slider__btn slider__btn--next">
            <svg viewBox="0 0 32 32" width="24" height="24">
              <use href="/icon.svg#icon-right-arrow-alt"></use>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
